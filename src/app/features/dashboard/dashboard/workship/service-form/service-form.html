<div class="sf-container">
  <div class="sf-header">
    <h1>{{ isEditMode() ? 'Modifier le culte' : 'Nouveau culte' }}</h1>
    <button type="button" class="sf-btn-secondary" (click)="cancel()">Annuler</button>
  </div>

  @if (error()) {
  <div class="sf-error">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="sf-form">

    <!-- ─── CHAMPS PRINCIPAUX ─── -->
    <div class="sf-grid-2">
      <div class="sf-field">
        <label>Titre du culte <span class="sf-required">*</span></label>
        <input type="text" formControlName="title" placeholder="Ex: Culte dominical…">
        <p class="sf-error-text" *ngIf="isFieldInvalid('title')">Le titre est requis.</p>
      </div>
      <div class="sf-field">
        <label>Date et heure <span class="sf-required">*</span></label>
        <input type="datetime-local" formControlName="date">
        <p class="sf-error-text" *ngIf="isFieldInvalid('date')">La date est requise.</p>
      </div>
    </div>

    <div class="sf-grid-2">
      <div class="sf-field">
        <label>Église <span class="sf-required">*</span></label>
        <select formControlName="churchId">
          <option value="">-- Choisir une église --</option>
          @for (church of churches(); track church.id) {
          <option [value]="church.id">{{ church.name }}</option>
          }
        </select>
        <p class="sf-error-text" *ngIf="isFieldInvalid('churchId')">L'église est requise.</p>
      </div>
      <div class="sf-field">
        <label>Site</label>
        <select formControlName="siteId">
          <option value="">-- Choisir un site --</option>
          @for (site of sites(); track site.id) {
          <option [value]="site.id">{{ site.name }}</option>
          }
        </select>
      </div>
    </div>

    <!-- ─── PRÉDICATEUR ─── -->
    <div class="sf-field">
      <label>Prédicateur</label>
      <div class="sf-search-wrap">
        <input type="text" formControlName="preacherSearch" placeholder="Rechercher un pasteur…"
          (focus)="preachers().length > 0 && preachers.set(preachers())" autocomplete="off">
        <button type="button" class="sf-clear-btn" *ngIf="form.get('preacherSearch')?.value"
          (click)="clearPreacher()">✕</button>

        <div class="sf-search-dropdown" *ngIf="preachers().length > 0">
          @for (user of preachers(); track user.id) {
          <button type="button" class="sf-search-result" (click)="selectPreacher(user)">
            <div class="sf-mini-avatar">{{ getUserFullName(user).charAt(0) }}</div>
            <div class="sf-mini-info">
              <strong>{{ getUserFullName(user) }}</strong>
              <span class="sf-mini-role">{{ user.roles?.[0] || 'Pasteur' }}</span>
            </div>
          </button>
          }
        </div>
      </div>
    </div>

    <!-- ─── THÈME & VERSET ─── -->
    <div class="sf-grid-2">
      <div class="sf-field">
        <label>Thème</label>
        <input type="text" formControlName="theme" placeholder="Thème de la prédication">
      </div>
      <div class="sf-field">
        <label>Texte biblique</label>
        <input type="text" formControlName="bibleText" placeholder="Ex: Jean 3:16">
      </div>
    </div>

    <!-- ─── STATUT ─── -->
    <div class="sf-field">
      <label>Statut</label>
      <select formControlName="status">
        @for (opt of statusOptions; track opt.value) {
        <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>

    <!-- ─── NOTES ─── -->
    <div class="sf-field">
      <label>Notes</label>
      <textarea formControlName="notes" rows="3" placeholder="Remarques, annonces, etc."></textarea>
    </div>

    <!-- ─── PRÉSENCES ─── -->
    <div class="sf-section-divider">Présences</div>
    <div class="sf-grid-3" formGroupName="attendance">
      <div class="sf-field">
        <label>Hommes</label>
        <input type="number" formControlName="men" min="0">
      </div>
      <div class="sf-field">
        <label>Femmes</label>
        <input type="number" formControlName="women" min="0">
      </div>
      <div class="sf-field">
        <label>Enfants</label>
        <input type="number" formControlName="children" min="0">
      </div>
    </div>
    <div class="sf-grid-2" formGroupName="attendance">
      <div class="sf-field">
        <label>Visiteurs</label>
        <input type="number" formControlName="visitors" min="0">
      </div>
      <!-- ✅ REMPLACÉ "Pasteur & Staff" par "Accepté Jésus" et "Non accepté" -->
      <div class="sf-field">
        <label>Accepté Jésus</label>
        <input type="number" formControlName="acceptedJesus" min="0">
      </div>
      <div class="sf-field">
        <label>Non accepté</label>
        <input type="number" formControlName="notAcceptedJesus" min="0">
      </div>
    </div>

    <!-- ✅ NOUVEAU : Observation -->
    <div class="sf-field" formGroupName="attendance">
      <label>Observation</label>
      <textarea formControlName="observation" rows="2" placeholder="Remarques sur le déroulement du culte..."></textarea>
    </div>

    <!-- ✅ NOUVEAU : Photo justificative (upload) -->
    <div class="sf-field">
      <label>Photo justificative (obligatoire pour valider les présences)</label>
      <input type="file" (change)="onPhotoSelected($event)" accept="image/*" />
      <p class="sf-field-hint" *ngIf="!form.get('attendance.photoUrl')?.value">Aucune photo sélectionnée</p>
      <p class="sf-field-hint" *ngIf="form.get('attendance.photoUrl')?.value">✅ Photo téléchargée</p>
    </div>

    <!-- ─── BOUTONS D'ACTION ─── -->
    <div class="sf-actions">
      <button type="button" class="sf-btn-secondary" (click)="cancel()">Annuler</button>
      <button type="submit" class="sf-btn-primary" [disabled]="saving() || form.invalid">
        @if (saving()) {
        <span class="sf-spinner"></span> Enregistrement…
        } @else {
        {{ isEditMode() ? 'Mettre à jour' : 'Créer le culte' }}
        }
      </button>
    </div>

  </form>
</div>
