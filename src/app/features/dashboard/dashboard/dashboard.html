<div class="app-wrapper">

  <!-- SIDEBAR (gère elle-même son overlay mobile en interne) -->
  <app-sidebar-component></app-sidebar-component>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- ══ TOPBAR ══ -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle-btn" (click)="toggleSidebar()">
          <i class="bx bx-menu"></i>
        </button>
        <div class="breadcrumb">
          <span class="breadcrumb-home"><i class="bx bx-home-alt-2"></i></span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Tableau de Bord</span>
        </div>
        <div class="topbar-search">
          <i class="bx bx-search"></i>
          <input type="text" placeholder="Chercher un membre, événement..." />
        </div>
      </div>

      <div class="topbar-actions">
        <div class="session-pill">
          <span class="session-dot"></span>
          Connecté · {{ currentUser?.roles?.[0] || 'Membre' }}
        </div>

        <button class="topbar-icon-btn">
          <i class="bx bx-bell"></i>
          <span class="notif-dot"></span>
        </button>
        <button class="topbar-icon-btn">
          <i class="bx bx-refresh"></i>
        </button>

        <!-- User dropdown -->
        <div class="topbar-user" (click)="toggleUserMenu()">
          <div class="user-avatar" *ngIf="!userPhotoUrl || userPhotoUrl === ''">
            {{ getUserInitials() }}
          </div>
          <div class="user-text">
            <span class="user-name-text">{{ userName }}</span>
            <span class="user-role-text">{{ currentUser?.roles?.[0] || 'Membre MIAV' }}</span>
          </div>

          <!-- Dropdown menu -->
          <div class="dropdown-menu" [class.show]="showUserMenu">
            <div class="dropdown-header">
              <div class="dropdown-username">{{ userName }}</div>
              <div class="dropdown-role">{{ currentUser?.roles?.[0] || 'Membre MIAV' }}</div>
            </div>
            <hr class="dropdown-divider" />
            <a [routerLink]="['/dashboard/profil']" class="dropdown-item">
              <i class="bx bx-user"></i> Mon profil
            </a>
            <a [routerLink]="['/dashboard/parametres']" class="dropdown-item">
              <i class="bx bx-cog"></i> Paramètres
            </a>
            <hr class="dropdown-divider" />
            <a (click)="logout()" class="dropdown-item dropdown-item--danger">
              <i class="bx bx-log-out"></i> Déconnexion
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- ══ CONTENU DYNAMIQUE (dépend de la route enfant) ══ -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
